object-templates-raw: |
  {{- /* If the imported secret does not exist, the object-template evaluates to an empty object [] */ -}}
  {{- if and (lookup "v1" "Secret" "pull-secret-importer" "global-pull-secret-merge-source") (eq (lookup "v1" "Secret" "pull-secret-importer" "global-pull-secret-merge-source").kind "Secret") (hasKey (lookup "v1" "Secret" "pull-secret-importer" "global-pull-secret-merge-source").data ".dockerconfigjson") }}

  {{- /* Read .dockerconfigjson from global-pull-secret-merge-source and decode to json */ -}}
  {{- $localRaw := (fromSecret "pull-secret-importer" "global-pull-secret-merge-source" ".dockerconfigjson") | base64dec -}}
  {{- $localData := $localRaw | fromJson -}}

  {{- /* Fetch current global pull-secret to keep existing registry auths */ -}}
  {{- $currentSecret := (lookup "v1" "Secret" "evan-test-secrets" "pull-secret") -}}
  {{- $data := dict "auths" (dict) -}}
  {{- if $currentSecret -}}
    {{- $decoded := index $currentSecret.data ".dockerconfigjson" | base64dec -}}
    {{- if $decoded -}}
      {{- $data = $decoded | fromJson -}}
    {{- end -}}
  {{- end -}}

  {{- /* For each auth in the imported secret, add new registries or merge when credentials differ */ -}}
  {{- range $registry, $entry := $localData.auths }}
    {{- if hasKey $data.auths $registry }}
      {{- $existing := index $data.auths $registry }}
      {{- if ne ($existing | toJson) ($entry | toJson) }}
        {{- range $key, $val := $entry }}
          {{- $_ := set $existing $key $val }}
        {{- end }}
      {{- end }}
    {{- else }}
      {{- $_ := set $data.auths $registry $entry }}
    {{- end }}
  {{- end }}

  {{- /* Resolved object-template as single secret with merged auths in data base64-encoded */ -}}
  - complianceType: musthave
    objectDefinition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: pull-secret
        namespace: evan-test-secrets
      type: kubernetes.io/dockerconfigjson
      data:
        ".dockerconfigjson": {{ $data | toJson | base64enc | quote }}
  {{- else }}
  []
  {{- end }}
